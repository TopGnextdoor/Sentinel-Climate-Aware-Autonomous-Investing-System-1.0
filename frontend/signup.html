<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Sentinel</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at 50% 0%, #0a160a, #040804);
            color: #fff;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            animation: fadeIn 0.8s ease-out;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header svg {
            color: var(--neon-lime, #a8ff3e);
            margin-bottom: 1rem;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.05em;
        }
        .auth-subtitle {
            font-size: 0.85rem;
            color: var(--muted-text, #889988);
            margin-top: 0.5rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .input-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--muted-text, #889988);
            text-transform: uppercase;
        }
        .auth-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .auth-input:focus {
            outline: none;
            border-color: var(--neon-lime, #a8ff3e);
            background: rgba(168, 255, 62, 0.05);
            box-shadow: 0 0 15px rgba(168, 255, 62, 0.15);
        }
        .btn-auth {
            margin-top: 0.5rem;
            padding: 1rem;
            background: rgba(168, 255, 62, 0.1);
            color: var(--neon-lime, #a8ff3e);
            border: 1px solid var(--neon-lime, #a8ff3e);
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-auth:hover {
            background: var(--neon-lime, #a8ff3e);
            color: #040804;
            box-shadow: 0 0 20px rgba(168, 255, 62, 0.3);
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--muted-text, #889988);
        }
        .auth-footer a {
            color: var(--neon-lime, #a8ff3e);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        #auth-error {
            color: #ff4444;
            font-size: 0.8rem;
            text-align: center;
            min-height: 1.2rem;
            margin-top: -0.5rem;
        }
        #auth-success {
            color: #a8ff3e;
            font-size: 0.8rem;
            text-align: center;
            min-height: 1.2rem;
            margin-top: -0.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card auth-container">
        <div class="auth-header">
            <!-- Sentinel Registration Icon -->
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="20" y1="8" x2="20" y2="14"></line>
                <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            <h1 class="auth-title">NEW OPERATIVE</h1>
            <p class="auth-subtitle">Register a secure identity to the central node.</p>
        </div>

        <form id="signup-form" class="auth-form" onsubmit="handleSignup(event)">
            <div class="input-group">
                <label for="username" class="input-label">Operative Alias</label>
                <input type="text" id="username" class="auth-input" placeholder="e.g. Jane Doe" required>
            </div>
            
            <div class="input-group">
                <label for="email" class="input-label">Email</label>
                <input type="email" id="email" class="auth-input" placeholder="operative@sentinel.co" required>
            </div>
            
            <div class="input-group">
                <label for="password" class="input-label">Password</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
            </div>

            <div id="auth-error"></div>
            <div id="auth-success"></div>

            <button type="submit" class="btn-auth">Bind Identity</button>
        </form>

        <div class="auth-footer">
            Already verified? <a href="login.html">Access Terminal</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function handleSignup(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');
            const submitBtn = document.querySelector('.btn-auth');
            
            errorEl.innerText = '';
            successEl.innerText = '';
            submitBtn.innerText = 'PROCESSING...';
            submitBtn.style.opacity = '0.7';

            try {
                const response = await fetch(`${BASE_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    if (data.access_token) {
                        localStorage.setItem("token", data.access_token);
                    }
                    successEl.innerText = data.message || 'Identity successfully bound!';
                    submitBtn.innerText = 'ACCESS GRANTED';
                    submitBtn.style.background = '#a8ff3e';
                    submitBtn.style.color = '#000';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } else {
                    errorEl.innerText = data.detail || 'Registration failed.';
                    submitBtn.innerText = 'BIND IDENTITY';
                    submitBtn.style.opacity = '1';
                }
            } catch (err) {
                console.error('Signup error:', err);
                errorEl.innerText = 'Connection lost. Cannot register.';
                submitBtn.innerText = 'BIND IDENTITY';
                submitBtn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
